<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Game Official Store | R18 Digital Deals</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --steam-blue: #1b2838; --steam-light-blue: #66c0f4; --gold: #ffd700; --dark-grey: #0d1117; }
        body { background: var(--dark-grey); color: white; font-family: 'Noto Sans', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        .container { max-width: 1200px; margin: auto; padding: 0 20px; }

        /* Modern Hero Slider */
        .hero-slider {
            position: relative;
            width: 100%;
            height: 450px;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0 40px 0;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* Sidebar Dots */
        .slider-dots {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 99;
        }
        
        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.2);
        }
        
        .dot:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: scale(1.2);
        }
        
        .dot.active {
            background: #66c0f4;(--steam-light-blue);
            height: 25px; /* Makes the active dot a "pill" shape */
            border-radius: 5px;
        }
        
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            /* 1s is standard, 1.2s is extra sleek/slow */
            transition: opacity 1s ease-in-out; 
            display: none;
        }
        
        .slide.active {
            display: block;
            opacity: 1;
        }
        
        .slide img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            filter: brightness(0.6); 
        }

        .slide-info {
            position: absolute; 
            bottom: 30px; 
            left: 30px;
            background: rgba(0, 0, 0, 0.3); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 25px; 
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: fit-content; 
            max-width: 80%;
            animation: slideUp 0.8s ease-out;
            z-index: 20;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .slide-info h2 { 
            margin: 0; 
            font-size: 1.1rem; 
            font-family: 'Montserrat', sans-serif;
            color: #fff; 
            line-height: 1.2;
        }
        
        .slide-info p { 
            color: var(--steam-light-blue); 
            margin: 4px 0 0 0; 
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Store Grid */
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .game-card { background: #161b22; border-radius: 10px; overflow: hidden; border: 1px solid #30363d; transition: 0.3s; position: relative; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--steam-light-blue); }
        .game-card img { width: 100%; aspect-ratio: 460/215; object-fit: cover; }
        
        .info { padding: 15px; }
        .title-en { font-weight: bold; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .title-cn { color: var(--steam-light-blue); font-size: 0.8rem; margin-bottom: 10px; height: 1.2rem; }
        
        .price-row { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }
        .old-price { text-decoration: line-through; color: #888; font-size: 0.85rem; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.1rem; }

        .badge-hot { position: absolute; top: 10px; left: 10px; background: linear-gradient(45deg, #ff4b2b, #ff416c); color: white; padding: 3px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; z-index: 5; }

        #search-bar { width: 100%; padding: 15px 25px; border-radius: 30px; border: 1px solid #30363d; background: #161b22; color: white; margin: 30px 0; font-size: 1rem; }
        .add-btn { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 10px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .add-btn:hover { background: var(--steam-light-blue); color: black; }
        #cart-btn { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: black; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); z-index: 100; }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="search-bar" placeholder="Search by name or Chinese title..." onkeyup="filterGames()">

    <div id="hero-slider" class="hero-slider">
    <div id="slider-dots" class="slider-dots"></div>
</div>

    <h2 style="font-family: 'Montserrat'; margin-bottom: 25px;">Latest Arrivals</h2>
    <div class="store-grid" id="game-display"></div>
</div>

<div id="cart-btn" onclick="checkout()">🛒 CART (<span id="cart-count">0</span>)</div>

<script>
    let allGames = [];
    let cart = JSON.parse(localStorage.getItem('ace_cart')) || [];

    async function loadGames() {
        try {
            const response = await fetch('games.json?v=' + Date.now());
            allGames = await response.json();
            renderStore(allGames);
            updateCartCount();
        } catch (e) { console.error("Load failed", e); }
    }

    function renderStore(games) {
        // 1. Setup Slideshow
        let featured = games.filter(g => g.is_featured);
        if (featured.length === 0) featured = games.slice(0, 5); 
    
        const slider = document.getElementById('hero-slider');
        
        // Inject Slides and Dots together
        slider.innerHTML = featured.map((g, i) => `
            <div class="slide ${i === 0 ? 'active' : ''}">
                <a href="details.html?id=${g.id}" target="_blank">
                    <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${g.id}/library_hero.jpg" 
                         onerror="this.src='https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${g.id}/header.jpg'">
                    <div class="slide-info">
                        <h2>${g.name}</h2>
                        <p>${g.name_cn || ""}</p>
                    </div>
                </a>
            </div>
        `).join('') + `
        <div id="slider-dots" class="slider-dots">
            ${featured.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></div>`).join('')}
        </div>`;
    
        // 2. Start the autoplay
        startAutoPlay();
    
        // 3. FIX: Ensure this function exists and is called correctly
        renderGrid(games); 
    }

    function renderGrid(games) {
        const display = document.getElementById('game-display');
        if (!display) return;
    
        display.innerHTML = games.map(g => {
            // Handle "Hot" badge logic
            const hotBadge = g.is_hot ? `<div class="badge-hot">🔥 HOT</div>` : "";
            
            // Handle Price logic (Default to 4.00 if missing)
            const currentPrice = (g.price || 4.0).toFixed(2);
            const oldPriceHTML = (g.original_price > 0) ? `<span class="old-price">RM ${g.original_price.toFixed(2)}</span>` : "";
    
            // Handle Image logic
            const imgPath = (g.custom_img && g.custom_img !== "") ? g.custom_img : `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${g.id}/header.jpg`;
    
            return `
                <div class="game-card">
                    ${hotBadge}
                    <a href="details.html?id=${g.id}">
                        <img src="${imgPath}" onerror="this.src='https://via.placeholder.com/460x215/1b2838/66c0f4?text=Ace+Game'">
                    </a>
                    <div class="info">
                        <div class="title-en">${g.name}</div>
                        <div class="title-cn">${g.name_cn || ""}</div>
                        <div class="price-row">${oldPriceHTML}<span class="price">RM ${currentPrice}</span></div>
                        <button class="add-btn" onclick="addToCart('${g.name.replace(/'/g, "\\'")}', ${g.price || 4})">ADD TO CART</button>
                    </div>
                </div>`;
        }).join('');
    }

    let slideIndex = 0;
    function startAutoPlay() {
        // If a timer already exists, kill it immediately
        if (slideInterval) {
        clearInterval(slideInterval);
        }

        // Start a fresh 5-second timer
        slideInterval = setInterval(() => {
            const slides = document.querySelectorAll('.slide');
            if (slides.length < 2) return;
        
            let next = (slideIndex + 1) % slides.length;
            goToSlide(next);
        }, 5000); 
    }
    
    function goToSlide(n) {
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    
    if(!slides.length || !dots.length) return;

    slides[slideIndex].classList.remove('active');
    dots[slideIndex].classList.remove('active');
    
    // 2. Update the global index to the one you clicked
    slideIndex = n;
    
    // 3. Add 'active' to the new slide and dot
    slides[slideIndex].classList.add('active');
    dots[slideIndex].classList.add('active');

    // 4. Restart the auto-play timer so it doesn't flip immediately
    startAutoPlay();
    }
    
    function filterGames() {
        const q = document.getElementById('search-bar').value.toLowerCase();
        const filtered = allGames.filter(g => g.name.toLowerCase().includes(q) || (g.name_cn && g.name_cn.toLowerCase().includes(q)));
        renderGrid(filtered);
        document.getElementById('hero-slider').style.display = q ? "none" : "block";
    }

    function addToCart(name, price) {
        cart.push({name, price});
        localStorage.setItem('ace_cart', JSON.stringify(cart));
        updateCartCount();
        event.target.innerText = "ADDED! ✅";
        setTimeout(() => event.target.innerText = "ADD TO CART", 1000);
    }

    function updateCartCount() { document.getElementById('cart-count').innerText = cart.length; }

    function checkout() {
        if(cart.length === 0) return alert("Cart is empty!");
        const total = cart.reduce((s, i) => s + i.price, 0);
        const msg = `Order Request:\n- ${cart.map(i => i.name).join('\n- ')}\n\nTotal: RM ${total.toFixed(2)}`;
        window.open(`https://t.me/acegameos?text=${encodeURIComponent(msg)}`);
    }

    loadGames();
</script>
</body>
</html>
