<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Game OS R18 Store</title>
<style>
    /* === NEW SLIDESHOW CSS === */
    .hero-slider {
        position: relative;
        width: 100%;
        height: 480px; /* Adjust height as needed */
        border-radius: 15px;
        overflow: hidden;
        margin: 20px 0 40px 0;
        background: #000;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .slide {
        position: absolute;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 1.2s ease-in-out;
        display: none;
    }

    .slide.active {
        display: block;
        opacity: 1;
    }

    .slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.7); /* Makes text easier to read */
    }

    /* Glassmorphism Info Box */
    .slide-info {
        position: absolute;
        bottom: 40px;
        left: 40px;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        padding: 25px;
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-width: 450px;
        animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .slide-info h2 { margin: 0; font-size: 2rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    .slide-info p { color: var(--steam-light-blue); margin: 8px 0 0 0; font-size: 1.1rem; font-weight: 500; }
</style>
</head>
<body>

<header>
    <h1>Welcome to Ace Game R18 Official Store</h1>
    <p>⚡Pay Less, Play More⚡</p>
</header>

<div class="container">
    <input type="text" id="search-bar" placeholder="Search games..." onkeyup="filterGames()">

    <div id="hero-slider" class="hero-slider">
        </div>

    <h2>Latest Arrivals</h2>
    <div class="store-grid" id="game-display"></div>
</div>

<footer>
    <div>
        <h3>Ace Game R18 Official Store</h3>
        <p>Your #1 Source for the best deals.</p>
        <div class="footer-socials">
            <a href="https://t.me/acegameos">Telegram Support</a> | 
            <a href="https://www.acegame.cc">Main Site</a>
        </div>
        <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">&copy; 2026 Ace Game OS. All Rights Reserved.</p>
    </div>
</footer>

<script>
let allGames = [];
    let cart = JSON.parse(localStorage.getItem('ace_cart')) || [];

    async function loadGames() {
        try {
            // Fetch the JSON with a timestamp to avoid old cached versions
            const response = await fetch('games.json?v=' + Date.now());
            if (!response.ok) throw new Error('Network response was not ok');
            
            allGames = await response.json();
            console.log("Games loaded successfully:", allGames.length);
            renderStore(allGames);
        } catch (error) {
            console.error("Error loading games:", error);
            document.getElementById('game-display').innerHTML = 
                `<p style="text-align:center; color:red;">Error: Could not load games. Check if games.json has a typo or a missing comma.</p>`;
        }
    }

function renderStore(allGames) {
    // 1. Handle Slideshow
    const slider = document.getElementById('hero-slider');
    const featured = allGames.filter(g => g.is_featured);
    
    if (featured.length > 0) {
        slider.style.display = "block";
        slider.innerHTML = featured.map((game, index) => `
            <div class="slide ${index === 0 ? 'active' : ''}">
                <a href="details.html?id=${game.id}">
                    <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${game.id}/library_hero.jpg" 
                         onerror="this.src='https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${game.id}/header.jpg'">
                    <div class="slide-info">
                        <h2>${game.name}</h2>
                        <p>${game.name_cn || ""}</p>
                    </div>
                </a>
            </div>
        `).join('');
        startAutoPlay();
    } else {
        slider.style.display = "none";
    }

    // 2. Handle Grid (The rest of the games)
    const display = document.getElementById('game-display');
    display.innerHTML = allGames.map(game => createCardHTML(game)).join('');
}

let slideInterval;
function startAutoPlay() {
    if (slideInterval) clearInterval(slideInterval);
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    
    slideInterval = setInterval(() => {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
    }, 5000); // 5 seconds
}
            return `
            <div class="game-card">
                <a href="details.html?id=${gameId}&name=${encodeURIComponent(name)}">
                    <img src="${imageSrc}" 
                         loading="lazy" 
                         onerror="this.onerror=null; this.src='https://via.placeholder.com/460x215/1b2838/66c0f4?text=${encodeURIComponent(name)}';">
                </a>
                <div class="info">
                    <div style="font-weight:bold; height: 40px; overflow: hidden;">${name}</div>
                    <div class="price">RM ${price.toFixed(2)}</div>
                    <button class="add-btn" onclick="addToCart('${name.replace(/'/g, "\\'")}', ${price})">ADD TO CART</button>
                </div>
            </div>`;
        }).join('');
    }

    function filterGames() {
        const query = document.getElementById('search-bar').value.toLowerCase();
        const filtered = allGames.filter(g => g.name.toLowerCase().includes(query));
        renderStore(filtered);
    }

    function addToCart(name, price) {
        cart.push({name, price});
        localStorage.setItem('ace_cart', JSON.stringify(cart));
        updateCartCount();
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "ADDED! ✅";
        setTimeout(() => btn.innerText = originalText, 1000);
    }

    function updateCartCount() {
        const countEl = document.getElementById('cart-count');
        if (countEl) countEl.innerText = cart.length;
    }

    function checkout() {
        if(cart.length === 0) return alert("Cart is empty!");
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        const itemNames = cart.map(i => i.name).join("\n- ");
        const message = `Order Request from Ace Store:\n\nItems:\n- ${itemNames}\n\nTotal: RM ${total.toFixed(2)}`;
        window.open(`https://t.me/acegameos?text=${encodeURIComponent(message)}`);
    }

    loadGames();
    updateCartCount();
</script>
</body>
</html>
