<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Details - Ace Game</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div class="container">
        <h1 id="game-title">Loading...</h1>
        
        <div class="header-images">
            <img id="game-capsule" src="" alt="Game Header" style="width: 100%; border-radius: 8px;">
        </div>

        <div id="steam-widget-container" style="margin-top: 20px;">
            </div>

        <div class="price-section" style="margin-top: 20px; padding: 15px; background: #1b2838; border-radius: 8px; color: white;">
            <h3>Ace Game Special Price</h3>
            <p>Steam Price: <span id="pay-old-price" style="text-decoration: line-through; color: #888;">--</span></p>
            <p>Our Price: <span id="pay-new-price" style="font-size: 1.5em; color: #66c0f4; font-weight: bold;">--</span></p>
            <img id="pay-capsule" src="" alt="Checkout Capsule" style="width: 100px; margin-top: 10px; border-radius: 4px;">
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const appId = urlParams.get('id');

        // IMPORTANT: Ensure this matches your Cloudflare Worker's expected format
        const CF_PROXY = "https://calm-forest-04ce.acegame0805.workers.dev/?url="; 

        async function loadPageData() {
            if (!appId) {
                document.getElementById('game-title').innerText = "No Game ID Provided";
                return;
            }

            try {
                // 1. Fetch data from Steam via Proxy
                const steamUrl = `https://store.steampowered.com/api/appdetails?appids=${appId}&l=english`;
                const response = await fetch(CF_PROXY + encodeURIComponent(steamUrl));
                
                if (!response.ok) throw new Error("Proxy connection failed");

                const json = await response.json();
                
                if (!json[appId] || !json[appId].success) {
                    throw new Error("Steam data not found");
                }

                const data = json[appId].data;

                // 2. Update UI with Steam Data
                document.getElementById('game-title').innerText = data.name;
                const capsuleUrl = `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${appId}/capsule_616x353.jpg`;
                document.getElementById('game-capsule').src = capsuleUrl;
                document.getElementById('pay-capsule').src = capsuleUrl;
                
                // 3. Insert Steam Widget
                document.getElementById('steam-widget-container').innerHTML = `
                    <div style="width: 100%; overflow: hidden;">
                        <iframe src="https://store.steampowered.com/widget/${appId}/" frameborder="0" width="100%" height="190"></iframe>
                    </div>
                `;

                // 4. Fetch your custom price from games.json
                const steamOriginalPrice = data.price_overview ? (data.price_overview.initial / 100).toFixed(2) : "59.00";
                fetchAcePrice(appId, steamOriginalPrice);

            } catch (err) {
                console.error("Error loading data:", err);
                document.getElementById('game-title').innerText = "Error Loading Game Details";
            }
        }

        async function fetchAcePrice(id, steamOriginal) {
            try {
                const res = await fetch('games.json');
                const games = await res.json();
                const myGame = games.find(g => g.id == id || g.id == parseInt(id));
                
                // Fallback to RM 4.00 if the game isn't in your JSON list
                const acePrice = myGame ? myGame.price : 4.00;
                
                document.getElementById('pay-old-price').innerText = `RM ${steamOriginal}`;
                document.getElementById('pay-new-price').innerText = `RM ${parseFloat(acePrice).toFixed(2)}`;
            } catch (err) {
                console.error("Error fetching local price:", err);
            }
        }

        loadPageData();
    </script>
</body>
</html>
